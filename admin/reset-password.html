<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Nuova Password — LocalPoint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(160deg, #0d1b2e 0%, #112240 60%, #0a1628 100%); }
    .card { background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.25); padding:44px 40px; width:100%; max-width:420px; }
    .card h2 { font-size:1.4rem; font-weight:800; color:#0f172a; letter-spacing:-0.03em; margin:0 0 6px; }
    .card p.sub { color:#64748b; font-size:0.875rem; margin:0 0 28px; }
    .input-group { position:relative; }
    .input-group .icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.9rem; pointer-events:none; }
    .input-group input { width:100%; box-sizing:border-box; padding:11px 40px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:0.9rem; color:#0f172a; background:#f8fafc; outline:none; transition:border-color 0.18s, box-shadow 0.18s; }
    .input-group input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.1); background:#fff; }
    .toggle { position:absolute; right:13px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#94a3b8; font-size:0.9rem; }
    label { display:block; font-size:0.78rem; font-weight:600; color:#475569; margin-bottom:6px; }
    #save-btn { width:100%; padding:13px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-size:0.95rem; font-weight:700; border:none; border-radius:11px; cursor:pointer; box-shadow:0 4px 14px rgba(37,99,235,0.35); display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
    #save-btn:disabled { opacity:0.7; cursor:not-allowed; }
    #msg { display:none; align-items:center; gap:8px; padding:10px 14px; border-radius:9px; font-size:0.82rem; font-weight:500; }
    #msg.error { display:flex; background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }
    #msg.success { display:flex; background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Nuova Password</h2>
    <p class="sub">Scegli una password sicura per il tuo account</p>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div>
        <label>Nuova Password</label>
        <div class="input-group">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" id="new-pw" placeholder="Minimo 8 caratteri">
          <button type="button" class="toggle" onclick="togglePw('new-pw','eye1')"><i class="fa-regular fa-eye" id="eye1"></i></button>
        </div>
      </div>
      <div>
        <label>Conferma Password</label>
        <div class="input-group">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" id="confirm-pw" placeholder="Ripeti la password">
          <button type="button" class="toggle" onclick="togglePw('confirm-pw','eye2')"><i class="fa-regular fa-eye" id="eye2"></i></button>
        </div>
      </div>

      <div id="msg"></div>

      <button id="save-btn">
        <i class="fa-solid fa-check" id="save-icon"></i>
        <span id="save-text">Salva nuova password</span>
      </button>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../src/supabaseClient.js'

    function togglePw(id, iconId) {
      const el = document.getElementById(id)
      const ic = document.getElementById(iconId)
      el.type = el.type === 'password' ? 'text' : 'password'
      ic.className = el.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash'
    }
    window.togglePw = togglePw

    function showMsg(text, type) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = type
    }

    document.getElementById('save-btn').addEventListener('click', async () => {
      const pw  = document.getElementById('new-pw').value
      const pw2 = document.getElementById('confirm-pw').value
      const btn = document.getElementById('save-btn')
      const ico = document.getElementById('save-icon')
      const txt = document.getElementById('save-text')

      if (pw.length < 8)      return showMsg('La password deve avere almeno 8 caratteri.', 'error')
      if (pw !== pw2)         return showMsg('Le password non coincidono.', 'error')

      btn.disabled = true
      ico.className = 'fa-solid fa-spinner fa-spin'
      txt.textContent = 'Salvataggio...'

      const { error } = await supabase.auth.updateUser({ password: pw })

      btn.disabled = false
      ico.className = 'fa-solid fa-check'
      txt.textContent = 'Salva nuova password'

      if (error) {
        showMsg('Errore: ' + error.message, 'error')
      } else {
        showMsg('Password aggiornata! Verrai reindirizzato al login...', 'success')
        setTimeout(() => window.location.href = '/admin/index.html', 2500)
      }
    })
  </script>
</body>
</html>
